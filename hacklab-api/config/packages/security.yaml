security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        login:
            pattern: ^/api/auth/login
            stateless: true
            login_throttling:
                max_attempts: 5
                interval: '1 minute'
            provider: app_user_provider
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern:   ^/api
            stateless: true
            jwt: ~
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/user, roles: PUBLIC_ACCESS, methods: [GET]}
        - { path: ^/api/user, roles: ROLE_ADMIN, methods: [DELETE]}
        - { path: ^/api/module, roles: PUBLIC_ACCESS, methods: [GET]}
        - { path: ^/api/module, roles: ROLE_ADMIN, methods: [POST, DELETE]}
        - { path: ^/api/task, roles: PUBLIC_ACCESS , methods: [GET]}
        - { path: ^/api/task, roles: ROLE_ADMIN , methods: [POST, PUT, DELETE]}
        - { path: ^/api/categorie, roles: PUBLIC_ACCESS, methods: [GET]}
        - { path: ^/api/categorie, roles: ROLE_ADMIN, methods: [POST, DELETE]}
        - { path: ^/api/course, roles: PUBLIC_ACCESS, methods: [GET]}
        - { path: ^/api/course, roles: ROLE_ADMIN, methods: [POST, DELETE]}
        - { path: ^/api/challenge, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/challenge, roles: ROLE_ADMIN, methods: [POST, DELETE]}
        - { path: ^/api/certification, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/certification, roles: ROLE_ADMIN, methods: [POST, DELETE] }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
